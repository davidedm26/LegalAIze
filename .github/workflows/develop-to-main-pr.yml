# This workflow runs checks on pull requests from develop to main, ensuring that only well-tested and linted code is merged into the main branch. It measures metrics with the evaluation pipeline and logs results to MLflow and checks if they meet the expected thresholds before allowing the merge.

name: Develop → Main PR Checks

on:
  pull_request:
    branches:
      - main # Only run on PRs targeting the main branch
    types: [opened, synchronize, reopened] # Only run on PR creation, updates, or reopening

permissions:
  contents: read 

env:
  PYTHON_VERSION: '3.11'
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  release-checks:
    name: Release Gate
    # Only run this job if the PR is from develop to main
    if: github.head_ref == 'develop' 
    runs-on: ubuntu-latest

    steps:
      # Download the code
      - uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      # Try to restore pip cache
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies if cache is not hit
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest
      
      # Lint the codebase with flake8
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      # Placeholder for building containers if needed in the future (Github Actions has a space limit, so we can skip this for now)
      - name: Backend regression smoke
        run: |
          echo "✓ Backend regression smoke (placeholder)"
      
      # Placeholder for frontend regression smoke tests
      - name: Frontend regression smoke
        run: |
          echo "✓ Frontend regression smoke (placeholder)"
