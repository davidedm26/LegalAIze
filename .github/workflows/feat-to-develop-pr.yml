name: Feature → Develop PR Checks


on:
  pull_request:
    branches:
      - develop # Trigger on PRs targeting develop; 
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-train:
    name: Build, Evaluate & Log Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install Python dependencies (includes DVC/MLflow used in repro/logging)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[http]
          pip install mlflow

 

      # Configure DVC remote with Dagshub credentials (per-run, not persisted)
      - name: Configure DVC remote
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote list | grep -q '^origin' || dvc remote add -d origin https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ github.event.repository.name }}.dvc
          dvc remote default origin
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      # Bring data/artifacts needed for repro
      - name: Pull data from DVC
        run: |
          dvc pull
        continue-on-error: true

      # Reproduce pipeline; evaluate_rag will log to MLflow if configured
      - name: Run DVC pipeline (logs to MLflow)
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          
        run: |
          dvc repro



      # Print latest MLflow run metrics for quick visibility in logs
      - name: Show latest MLflow metrics
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python - <<'PY'
          import mlflow
          mlflow.set_tracking_uri("https://dagshub.com/${{ github.repository }}.mlflow")
          exp = mlflow.get_experiment_by_name("rag_evaluation")
          if not exp:
              print("Experiment rag_evaluation not found")
          else:
              runs = mlflow.search_runs([exp.experiment_id], max_results=5, order_by=["start_time DESC"])
              if runs.empty:
                  print("No runs in rag_evaluation")
              else:
                  row = runs.iloc[0]
                  print(f"Latest run: {row.run_id} (status={row.status})")
                  for col in runs.columns:
                      if col.startswith("metrics."):
                          print(f"{col}: {row[col]}")
          PY
