name: Daily Evaluation & Alert

on:
  schedule:
    - cron: '59 10 * * *'  
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  THRESHOLD_MAE: "1.0"
  THRESHOLD_GROUNDEDNESS: "0.5"
  THRESHOLD_FAITHFULNESS: "0.5"
  THRESHOLD_NOTE_SIMILARITY: "0.35"

jobs:
  daily-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyGitHub

      - name: Pull data from DVC
        run: dvc pull

      - name: Run evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python evaluate_rag.py

      - name: Check metric thresholds and open issue if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          THRESHOLD_MAE: ${{ env.THRESHOLD_MAE }}
          THRESHOLD_GROUNDEDNESS: ${{ env.THRESHOLD_GROUNDEDNESS }}
          THRESHOLD_FAITHFULNESS: ${{ env.THRESHOLD_FAITHFULNESS }}
          THRESHOLD_NOTE_SIMILARITY: ${{ env.THRESHOLD_NOTE_SIMILARITY }}
        run: |
          python .github/scripts/check_and_issue.py
