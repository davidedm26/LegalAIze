#      - data/mapping.json
#      - data/processed/vector_index
#    params:
#      - vectorization
#      - ingestion
#    outs:
#      - data/processed/requirement_chunks.json

  evaluate_rag:
    cmd: python evaluate_rag.py
    deps:
      - evaluate_rag.py
      - evaluation/ 
      - data/processed/requirement_chunks.json
      - data/ground_truth
    params:
      - evaluation
      - llm
    outs:
      - metrics/rag_eval.json
