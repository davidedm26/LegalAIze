stages:
  ingest:
    cmd: 
      - python ingestion/data_ingestion.py
    deps:
      - data/mapping.json
      - ingestion/
      - data/raw_data/
    params:
      - ingestion
    outs:
      - data/processed/requirement_chunks.json
      - data/processed/ai_act_parsed.json
      - data/processed/iso_parsed.json

  vectorize:
    cmd: python vectorize_data.py
    deps:
      - vectorize_data.py
      - data/processed/requirement_chunks.json
    params:
      - vectorization
    outs:
      - data/processed/vector_index

  evaluate_rag:
    cmd: python evaluate_rag.py
    deps:
      - backend/rag_engine.py
      - evaluate_rag.py
      - evaluation/ 
      - data/processed/requirement_chunks.json
      - data/ground_truth
    params:
      - evaluation
      - rag
    outs:
      - metrics/rag_eval.json
      - metrics/ragas_sub_requirements.json
      - metrics/ragas_main_requirements.json
