# Parameters for LegalAIze Project 

ingestion:
  data_dir: "data/"
  processed_data_dir: "data/processed"

vectorization:
  model_name: "paraphrase-multilingual-MiniLM-L12-v2" # SentenceTransformer model for embeddings
  collection_name: "legal_docs" # Qdrant collection name for storing vectors
  vector_index_path: "data/processed/vector_index" # Path to save vector index (if using local file-based storage)

rag:
  document_chunk_size: 1500
  document_chunk_overlap: 150
  document_chunks_top_k: 3
  llm_model: "gpt-4o-mini"  # RAG LLM model
  llm_temperature: 0.0

evaluation:
  llm_model: "gpt-4o-mini" # RAGAS evaluation LLM model
  llm_temperature: 0.0 # RAGAS evaluation LLM temperature
  mlflow_experiment: "rag_evaluation" # MLflow experiment name for tracking
  case_selector: [5]  # e.g., 2 or [1,3] to evaluate specific cases; null runs all
  requirement_limit: null  # Limit number of requirements to evaluate; null evaluates all
  ground_truth:
    - name: "Evaluation1"
      document_path: "data/ground_truth/raw_data/Evaluation1/documentation.txt"
      report_path: "data/ground_truth/raw_data/Evaluation1/report_3.CSV"
    - name: "Evaluation2"
      document_path: "data/ground_truth/raw_data/Evaluation2/documentation.txt"
      report_path: "data/ground_truth/raw_data/Evaluation2/report_2.CSV"
    - name: "Evaluation3"
      document_path: "data/ground_truth/raw_data/Evaluation3/documentation.txt"
      report_path: "data/ground_truth/raw_data/Evaluation3/report.CSV"
    - name: "Evaluation4"
      document_path: "data/ground_truth/raw_data/Evaluation4/documentation.txt"
      report_path: "data/ground_truth/raw_data/Evaluation4/report.CSV"
    - name: "Evaluation5"
      document_path: "data/ground_truth/raw_data/Evaluation5/documentation.txt"
      report_path: "data/ground_truth/raw_data/Evaluation5/report_3.CSV"
